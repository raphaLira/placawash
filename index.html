*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.045) 2px,rgba(0,0,0,.045) 4px);}
.grid-bg{background-image:linear-gradient(rgba(0,229,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.028) 1px,transparent 1px);background-size:44px 44px;}
.neon-glow{box-shadow:0 0 8px rgba(0,229,255,.35),0 0 28px rgba(0,229,255,.14),inset 0 0 18px rgba(0,229,255,.03);}
.plate-wrap{border:3px solid var(--neon);border-radius:9px;background:var(--s2);position:relative;overflow:hidden;}
.plate-wrap::before{content:'BRASIL';position:absolute;top:-1px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;letter-spacing:4px;color:var(--neon);background:var(--s2);padding:0 8px;z-index:2;}
.plate-inp{background:transparent;border:none;outline:none;color:var(--neon);font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase;letter-spacing:.3em;text-align:center;width:100%;caret-color:var(--neon);font-size:clamp(26px,7.5vw,48px);}
.plate-inp::placeholder{color:rgba(0,229,255,.2);}
@keyframes scanmove{0%{top:0}100%{top:100%}}
.scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon),transparent);animation:scanmove 1.8s linear infinite;opacity:.75;}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
.up{animation:up .38s ease forwards;}
.blink{animation:blink 1.1s ease-in-out infinite;}
.nav{display:flex;background:var(--s1);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:40;}
.nav-btn{flex:1;padding:12px 4px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;background:none;border:none;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nav-btn.on{color:var(--acid);border-bottom-color:var(--acid);}
.fi{width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:10px 13px;font-size:14px;color:var(--txt);outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s;}
.fi:focus{border-color:rgba(0,229,255,.42);}
.fi::placeholder{color:var(--dim);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(7px);z-index:60;display:flex;align-items:flex-end;justify-content:center;padding:16px;}
@media(min-width:600px){.overlay{align-items:center;}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--neon);border-radius:2px;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.chip-green{background:rgba(76,175,80,.12);border:1px solid rgba(76,175,80,.3);color:#4caf50;}
.chip-blue{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.25);color:var(--neon);}
.chip-yellow{background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.25);color:#ffc107;}
.chip-purple{background:rgba(156,39,176,.15);border:1px solid rgba(156,39,176,.35);color:#ce93d8;}

<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

/* ─── CATEGORIAS FALLBACK ───────────────────────────────────── */
const CAT_FB = {
  MOTO:        {id:'MOTO',        label:'Moto',            emoji:'🏍️', desc:'Motocicletas e scooters',                color:'#ff6b35', preco:25},
  PEQUENO:     {id:'PEQUENO',     label:'Pequeno',         emoji:'🚗', desc:'Hatch e compactos',                      color:'#00e5ff', preco:45},
  SEDAN:       {id:'SEDAN',       label:'Sedan',           emoji:'🚙', desc:'Sedans médios e grandes',                color:'#7c4dff', preco:55},
  SUV:         {id:'SUV',         label:'SUV / Crossover', emoji:'🚐', desc:'SUVs e crossovers',                      color:'#ccff00', preco:70},
  CAMINHONETE: {id:'CAMINHONETE', label:'Caminhonete',     emoji:'🛻', desc:'Picapes e caminhonetes',                 color:'#ff4081', preco:80},
  VAN:         {id:'VAN',         label:'Van / Minivan',   emoji:'🚌', desc:'Vans e furgões',                         color:'#ff9800', preco:90},
  CAMINHAO:    {id:'CAMINHAO',    label:'Caminhão',        emoji:'🚛', desc:'Caminhões',                              color:'#f44336', preco:150},
  ONIBUS:      {id:'ONIBUS',      label:'Ônibus',          emoji:'🚍', desc:'Ônibus e micro-ônibus',                  color:'#009688', preco:200},
};

function rowToCat(r) {
  return {id:r.id, label:r.label, emoji:r.emoji||'🚗', desc:r.descricao||'', color:r.cor||'#00e5ff', preco:r.preco||0};
}

async function fetchCategorias() {
  try {
    const r = await fetch('/api/categorias');
    if (!r.ok) throw new Error('HTTP '+r.status);
    const rows = await r.json();
    if (!Array.isArray(rows)||!rows.length) throw new Error('vazio');
    return Object.fromEntries(rows.map(r=>[r.id, rowToCat(r)]));
  } catch(e) { console.warn('[cats]', e.message); return null; }
}

/* ─── CLASSIFY (fallback automático) ───────────────────────── */
function classify(d, cats) {
  const C = cats || CAT_FB;
  const s = [d.tipo||'',d.modelo||'',d.carroceria||'',d.especie||''].join(' ').toLowerCase();
  if (/moto|ciclomotor|scooter/i.test(s)||/^moto$/i.test(d.tipo||'')) return C.MOTO||CAT_FB.MOTO;
  if (/ônibus|onibus|micro[- ]?ônibus/i.test(s))                       return C.ONIBUS||CAT_FB.ONIBUS;
  if (/caminhão|caminhao|truck/i.test(s))                              return C.CAMINHAO||CAT_FB.CAMINHAO;
  if (/\bvan\b|furgão|furgao|kombi|sprinter|master|transit/i.test(s)) return C.VAN||CAT_FB.VAN;
  if (/picape|pickup|caminhonete|hilux|s10|ranger|amarok|frontier/i.test(s)) return C.CAMINHONETE||CAT_FB.CAMINHONETE;
  if (/\bsuv\b|crossover|tucson|compass|renegade|ecosport|creta|tracker/i.test(s)) return C.SUV||CAT_FB.SUV;
  if (/\bsedan\b|corolla|civic|jetta|passat|camry|cruze/i.test(s))    return C.SEDAN||CAT_FB.SEDAN;
  if (/hatch|gol\b|onix|hb20|polo\b|kwid|mobi|argo|sandero|palio/i.test(s)) return C.PEQUENO||CAT_FB.PEQUENO;
  if ((d.especie||'').toLowerCase().includes('carga'))                 return C.CAMINHAO||CAT_FB.CAMINHAO;
  if (['passageiro','turismo'].some(e=>(d.especie||'').toLowerCase().includes(e))) return C.SEDAN||CAT_FB.SEDAN;
  return C.PEQUENO||CAT_FB.PEQUENO;
}

/* ─── UTILS ─────────────────────────────────────────────────── */
const cleanP  = p => p.replace(/[^A-Z0-9]/gi,'').toUpperCase();
const isValid = p => { const c=cleanP(p); return /^[A-Z]{3}\d{4}$/.test(c)||/^[A-Z]{3}\d[A-Z]\d{2}$/.test(c); };
const fmtLbl  = p => /^[A-Z]{3}\d[A-Z]\d{2}$/.test(cleanP(p))?'MERCOSUL':'PADRÃO ANTIGO';
const fmtDisp = p => { const c=cleanP(p); return c.length>3?c.slice(0,3)+'-'+c.slice(3):c; };

/* ─── API PLACA ─────────────────────────────────────────────── */
async function consultarPlaca(placa) {
  const p   = cleanP(placa);
  const res = await fetch('/api/consultar',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({placa:p}), signal: AbortSignal.timeout(12000),
  });
  let json; try{json=await res.json();}catch{throw new Error('Resposta inválida.');}
  if (!res.ok||json.erro) throw new Error(json.msg||`Erro ${res.status}`);
  const ex = json.extra||{};
  return {
    placa:p, fromCache:!!json._cache,
    categoriaIdSalva: json._categoriaId||null,
    categoriaManual:  !!json._categoriaManual,
    consultadoEm:     json._consultadoEm||null,
    subSegNome:       json._subSegNome||null,
    marca:       json.MARCA||'',        modelo:      json.MODELO||ex.modelo||'',
    submodelo:   json.SUBMODELO||ex.grupo||'',
    ano:         json.ano||ex.ano_fabricacao||'', anoModelo: json.anoModelo||ex.ano_modelo||'',
    cor:         json.cor||'',          chassi:      json.chassi||'',
    codigoSituacao: String(json.codigoSituacao??'0'), dataConsulta: json.data||'',
    carroceria:  ex.carroceria||'',     combustivel: ex.combustivel||'',
    especie:     ex.especie||'',        municipio:   ex.municipio||'', uf: ex.uf||'',
    cilindradas: ex.cilindradas||'',    tipo:        ex.especie||json.tipo||'AUTOMOVEL',
  };
}

/* ─── GAMIFICAÇÃO ───────────────────────────────────────── */
async function fetchGamificacao() {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return null;
    const r = await fetch('/api/gamificacao?action=resumo', {
      headers: { Authorization: 'Bearer '+session.access_token },
    });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { console.error('[gamif]', e); return null; }
}

async function checkinGamificacao() {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return null;
    const r = await fetch('/api/gamificacao?action=checkin', {
      method: 'POST',
      headers: { Authorization: 'Bearer '+session.access_token },
    });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { console.error('[checkin]', e); return null; }
}

function StreakBar({gamif, onRefresh}) {
  if (!gamif) return null;
  const { streak, metaHoje, progressoHoje, totalHoje } = gamif;
  const pct = metaHoje>0 ? Math.min(100, Math.round(progressoHoje/metaHoje*100)) : 0;
  const bateu = progressoHoje >= metaHoje;

  return (
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:12,marginBottom:14,
      background: bateu ? 'linear-gradient(135deg,rgba(76,175,80,.12),rgba(76,175,80,.04))' : 'var(--s1)',
      border: `1px solid ${bateu ? 'rgba(76,175,80,.3)' : 'var(--bdr)'}`}}>

      {/* Streak */}
      <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
        <span style={{fontSize:20}}>{streak>0?'🔥':'💧'}</span>
        <div>
          <div style={{fontFamily:'Bebas Neue,cursive',fontSize:20,color:streak>0?'#ff9800':'var(--dim)',lineHeight:1}}>{streak}</div>
          <div style={{fontSize:9,color:'var(--dim)'}}>{streak===1?'dia':'dias'}</div>
        </div>
      </div>

      <div style={{width:1,height:32,background:'rgba(255,255,255,.1)',flexShrink:0}}/>

      {/* Meta do dia */}
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:3}}>
          <span style={{fontSize:11,color:'var(--dim)'}}>Meta de hoje</span>
          <span style={{fontSize:12,fontWeight:700,color:bateu?'#4caf50':'var(--txt)'}}>{progressoHoje}/{metaHoje} {bateu&&'🎉'}</span>
        </div>
        <div style={{height:6,background:'rgba(255,255,255,.06)',borderRadius:3,overflow:'hidden'}}>
          <div style={{height:'100%',width:pct+'%',background:bateu?'#4caf50':'var(--neon)',borderRadius:3,transition:'width .5s'}}/>
        </div>
      </div>

      {/* Total do dia */}
      <div style={{textAlign:'right',flexShrink:0}}>
        <div style={{fontFamily:'Bebas Neue,cursive',fontSize:18,color:'var(--acid)',lineHeight:1}}>R${totalHoje}</div>
        <div style={{fontSize:9,color:'var(--dim)'}}>hoje</div>
      </div>
    </div>
  );
}

/* ─── VEHICLE GRID ──────────────────────────────────────────── */
function VehicleGrid({d}) {
  const rows=[

function fmtFone(tel) {
  const n = (tel||'').replace(/\D/g,'');
  return n.startsWith('55') ? n : '55'+n;
}
const MSG_ENTRADA_DEFAULT = '🚗 *{nome_lavajato}*\n\nOlá! Recebemos seu veículo:\n*{marca} {modelo} {cor}*\nPlaca: *{placa}*\n\nServiço: *{servico}*\nValor: *R$ {valor}*\n\nAssim que ficar pronto te avisamos! ⏳';
const MSG_SAIDA_DEFAULT   = '✅ *{nome_lavajato}*\n\nSeu veículo está pronto!\n*{marca} {modelo} {cor}*\nPlaca: *{placa}*\n\nServiço: *{servico}*\nValor: *R$ {valor}*\n\nObrigado pela preferência! 💧';

async function fetchConfig() {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return null;
    const r = await fetch('/api/config', { headers: { Authorization: 'Bearer '+session.access_token } });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

function aplicarTemplate(template, p, config) {
  const sv  = SERVICOS.find(s=>s.id===p.servico)||{label:'Lavagem'};
  return template
    .replace(/\{nome_lavajato\}/g, config?.nome_lavajato || 'PlacaWash')
    .replace(/\{marca\}/g,    p.marca||'')
    .replace(/\{modelo\}/g,   p.modelo||'')
    .replace(/\{cor\}/g,      p.cor?'— '+p.cor:'')
    .replace(/\{placa\}/g,    fmtDisp(p.placa))
    .replace(/\{servico\}/g,  sv.label)
    .replace(/\{valor\}/g,    p.valor)
    .replace(/\n\s*\n\s*\n/g, '\n\n'); // remove linhas em branco extras se algum campo ficar vazio
}

function enviarWhats(tipo, p, config) {
  if (!p.telefone) return;
  const template = tipo==='entrada'
    ? (config?.msg_entrada || MSG_ENTRADA_DEFAULT)
    : (config?.msg_saida   || MSG_SAIDA_DEFAULT);
  const msg = aplicarTemplate(template, p, config);
  window.open('https://wa.me/'+fmtFone(p.telefone)+'?text='+encodeURIComponent(msg),'_blank');
}

/* ─── NOVA OS MODAL (4 passos) ──────────────────────────── */
function NovaOSModal({cats, config, onClose, onSaved}) {
  const [step,          setStep]          = useState(1);

  // Passo 1 — Cliente
  const [clienteQuery,  setClienteQuery]  = useState('');
  const [clienteResultados, setClienteResultados] = useState([]);
  const [clienteSel,    setClienteSel]    = useState(null);
  const [loadingCli,    setLoadingCli]    = useState(false);
  const [showNovoCliente, setShowNovoCliente] = useState(false);
  const [nomeNovo,      setNomeNovo]      = useState('');
  const [telNovo,       setTelNovo]       = useState('');
  const [assinatura,    setAssinatura]    = useState(null);
  const [usarPlano,     setUsarPlano]     = useState(false);

  // Passo 2 — Placa
  const [plate,         setPlate]         = useState('');
  const [placaResult,   setPlacaResult]   = useState(null);
  const [loadingPlaca,  setLoadingPlaca]  = useState(false);
  const [erroPlaca,     setErroPlaca]     = useState('');

  // Passo 3 — Serviço
  const [servicosDisp,  setServicosDisp]  = useState([]);
  const [precosMatriz,  setPrecosMatriz]  = useState({});
  const [loadingServ,   setLoadingServ]   = useState(true);
  const [servico,       setServico]       = useState('');
  const [valor,         setValor]         = useState(0);
  const [obs,           setObs]           = useState('');

  // Saving
  const [saving,        setSaving]        = useState(false);

  const timerCli = useRef(null);

  // Carrega serviços ao abrir
  useEffect(()=>{
    (async()=>{
      try {
        const {data:{session}} = await supabase.auth.getSession();
        const auth = {Authorization:'Bearer '+session.access_token};
        const [rs,rp] = await Promise.all([
          fetch('/api/servicos',{headers:auth}),
          fetch('/api/servicos?action=precos',{headers:auth}),
        ]);
        const svs = await rs.json();
        const prs = await rp.json();
        const lista = Array.isArray(svs)?svs:[];
        setServicosDisp(lista);
        const map={};
        if(Array.isArray(prs)) prs.forEach(p=>{map[p.categoria_id+'|'+p.servico_id]=p.valor;});
        setPrecosMatriz(map);
        if(lista.length>0) setServico(lista[0].id);
      } catch(e){console.error(e);}
      finally{setLoadingServ(false);}
    })();
  },[]);

  // Atualiza valor quando muda serviço/placa
  useEffect(()=>{
    if(usarPlano&&assinatura?.plano){setValor(0);return;}
    const cat = placaResult?.cat;
    if(!cat||!servico) return;
    const key = cat.id+'|'+servico;
    const v   = precosMatriz[key];
    setValor(v!=null?v:(cat.preco||0));
  },[servico,placaResult,precosMatriz,usarPlano]);

  // ── BUSCA CLIENTE ─────────────────────────────────────────
  function handleClienteQuery(v){
    setClienteQuery(v);
    clearTimeout(timerCli.current);
    if(!v.trim()){setClienteResultados([]);return;}
    timerCli.current = setTimeout(async()=>{
      setLoadingCli(true);
      try{
        const r = await fetch('/api/clientes?busca='+encodeURIComponent(v));
        const d = await r.json();
        setClienteResultados(d.rows||[]);
      }catch(e){}finally{setLoadingCli(false);}
    },400);
  }

  async function selecionarCliente(c){
    setClienteSel(c);
    setClienteQuery('');
    setClienteResultados([]);
    setShowNovoCliente(false);
    // Pré-preenche placa se o cliente já tiver
    if(c.placas?.length>0 && !plate) setPlate(c.placas[0]);
    // Busca assinatura ativa
    try{
      const r = await fetch('/api/planos?action=assinatura&cliente_id='+c.id);
      const a = await r.json();
      setAssinatura(a);
      setUsarPlano(!!a?.plano && a.lavagens_usadas < a.plano.qtd_lavagens);
    }catch(e){}
  }

  // ── CONSULTA PLACA ────────────────────────────────────────
  async function consultar(){
    const p = cleanP(plate);
    if(!isValid(p)){setErroPlaca('Placa inválida.');return;}
    setLoadingPlaca(true); setErroPlaca(''); setPlacaResult(null);
    try{
      const data = await consultarPlaca(p);
      const cat  = classify(data, cats);
      setPlacaResult({data, cat});
    }catch(e){setErroPlaca(e.message||'Erro na consulta.');}
    finally{setLoadingPlaca(false);}
  }

  // ── CONFIRMAR OS ──────────────────────────────────────────
  async function confirmar(){
    setSaving(true);
    try{
      const nome     = nomeNovo.trim();
      const telefone = telNovo.replace(/\D/g,'');
      let   cId      = clienteSel?.id||null;

      // Salva cliente novo se informado
      if(showNovoCliente && (nome||telefone)){
        const rc = await fetch('/api/clientes',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({nome:nome||('Cliente '+fmtDisp(plate)),telefone,placas:plate?[cleanP(plate)]:[]})});
        const nc = await rc.json(); cId=nc?.id||null;
      } else if(clienteSel && plate){
        // Vincula placa ao cliente existente
        const placas = [...new Set([...(clienteSel.placas||[]),cleanP(plate)])];
        await fetch('/api/clientes',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({id:clienteSel.id,nome:clienteSel.nome,telefone:clienteSel.telefone,placas})});
      }

      const tel = telefone || clienteSel?.telefone || '';

      // Cria OS
      await fetch('/api/os',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        placa:   cleanP(plate)||'',
        marca:   placaResult?.data?.marca||'',
        modelo:  placaResult?.data?.modelo||'',
        cor:     placaResult?.data?.cor||'',
        categoria_id: placaResult?.cat?.id||null,
        servico, valor, obs, telefone:tel, cliente_id:cId,
        plano_usado: usarPlano&&assinatura?assinatura.id:null,
      })});

      // Usa lavagem do plano
      if(usarPlano&&assinatura){
        await fetch('/api/planos?action=usar&id='+assinatura.id,{method:'PATCH'});
      }

      // WhatsApp de entrada
      if(tel) enviarWhats('entrada',{
        telefone:tel, placa:cleanP(plate), marca:placaResult?.data?.marca,
        modelo:placaResult?.data?.modelo, cor:placaResult?.data?.cor,
        servico, valor,
      },config);

      onSaved();
    }catch(e){console.error(e);}
    finally{setSaving(false);}
  }

  // ── HELPERS DE UI ─────────────────────────────────────────
  const cat      = placaResult?.cat;
  const sv       = servicosDisp.find(s=>s.id===servico)||{nome:'',emoji:'💧'};
  const podeIr2  = true; // pode pular cliente
  const podeIr3  = !!placaResult;
  const podeConf = !!servico && valor>=0 && !!placaResult;

  const STEPS = ['Cliente','Veículo','Serviço','Confirmar'];

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="up" style={{width:'100%',maxWidth:500,background:'var(--s1)',border:'1px solid var(--bdr)',borderRadius:20,padding:20,maxHeight:'94vh',overflowY:'auto'}}>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontFamily:'Bebas Neue,cursive',fontSize:24,color:'var(--acid)'}}>NOVA OS</div>
          <button onClick={onClose} style={{padding:7,borderRadius:8,background:'rgba(255,255,255,.05)',border:'none',cursor:'pointer',color:'var(--dim)',fontSize:18}}>✕</button>
        </div>

        {/* Progress bar */}
        <div style={{display:'flex',gap:4,marginBottom:18}}>
          {STEPS.map((lb,i)=>(
            <div key={lb} onClick={()=>{ if(i===0||(i===1&&podeIr2)||(i===2&&podeIr3)||(i===3&&podeConf)) setStep(i+1); }}
              style={{flex:1,padding:'6px 4px',borderRadius:7,textAlign:'center',fontSize:10,fontWeight:600,cursor:'pointer',
                background:step===i+1?'rgba(204,255,0,.15)':step>i+1?'rgba(76,175,80,.1)':'rgba(255,255,255,.04)',
                border:`1px solid ${step===i+1?'rgba(204,255,0,.4)':step>i+1?'rgba(76,175,80,.3)':'rgba(255,255,255,.07)'}`,
                color:step===i+1?'var(--acid)':step>i+1?'#4caf50':'var(--dim)'}}>
              {step>i+1?'✓ ':''}{lb}
            </div>
          ))}
        </div>

        {/* ═══ PASSO 1: CLIENTE ═══ */}
        {step===1&&(
          <div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:7,textTransform:'uppercase'}}>Buscar cliente</label>
              <div style={{position:'relative'}}>
                <input type="text" value={clienteQuery} onChange={e=>handleClienteQuery(e.target.value)}
                  placeholder="Nome ou telefone…" className="fi"/>
                {loadingCli&&<span style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',width:13,height:13,border:'2px solid var(--neon)',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block',animation:'spin .9s linear infinite'}}/>}
              </div>
              {clienteResultados.length>0&&(
                <div style={{background:'var(--s2)',borderRadius:10,border:'1px solid var(--bdr)',overflow:'hidden',marginTop:6}}>
                  {clienteResultados.map(c=>(
                    <div key={c.id} onClick={()=>selecionarCliente(c)}
                      style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid rgba(255,255,255,.05)',display:'flex',alignItems:'center',gap:10}}>
                      <span style={{fontSize:16}}>👤</span>

            {clienteSel&&(

            {!showNovoCliente&&!clienteSel&&(

                  <input type="tel" value={telNovo} onChange={e=>setTelNovo(e.target.value.replace(/\D/g,''))} placeholder="WhatsApp (opcional)" className="fi" style={{fontFamily:'JetBrains Mono,monospace'}}/>

            <div style={{display:'flex',gap:8,marginTop:4}}>
              <button onClick={()=>{setClienteSel(null);setAssinatura(null);setStep(2);}}

        {/* ═══ PASSO 2: VEÍCULO ═══ */}
        {step===2&&(
          <div>

                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div style={{fontSize:28,width:48,height:48,borderRadius:11,display:'flex',alignItems:'center',justifyContent:'center',background:`${cat?.color||'#ccff00'}18`,flexShrink:0}}>{cat?.emoji||'🚗'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:700,color:'var(--txt)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{placaResult.data.marca} {placaResult.data.modelo}</div>

                      {placaResult.data.cor&&<span style={{fontSize:11,color:'var(--dim)'}}>🎨 {placaResult.data.cor}</span>}
                      <span style={{fontSize:11,color:cat?.color||'var(--acid)',fontWeight:600}}>{cat?.label}</span>
                    </div>
                  </div>
                  <div style={{fontFamily:'Bebas Neue,cursive',fontSize:24,color:cat?.color||'var(--acid)',flexShrink:0}}>R$ {cat?.preco||0}</div>
                </div>
              </div>
            )}

            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setStep(1)} style={{padding:'10px 14px',borderRadius:9,fontSize:13,cursor:'pointer',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.1)',color:'var(--dim)'}}>← Voltar</button>
              <button onClick={()=>setStep(3)} disabled={!placaResult}
                style={{flex:1,padding:'10px',borderRadius:9,fontSize:13,fontWeight:700,cursor:!placaResult?'not-allowed':'pointer',opacity:!placaResult?.5:1,background:'linear-gradient(135deg,rgba(0,229,255,.18),rgba(0,229,255,.08))',border:'1px solid rgba(0,229,255,.4)',color:'var(--neon)'}}>
                Próximo →
              </button>
            </div>
          </div>
        )}

        {/* ═══ PASSO 3: SERVIÇO ═══ */}
        {step===3&&(
          <div>
            {loadingServ&&<div style={{textAlign:'center',padding:'20px',color:'var(--dim)',fontSize:12}}>Carregando serviços…</div>}
            {!loadingServ&&(
              <>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                  {servicosDisp.map(s=>{
                    const precoServ = cat?(precosMatriz[cat.id+'|'+s.id]??cat.preco??0):0;
                    return (
                      <button key={s.id} onClick={()=>setServico(s.id)}
                        style={{padding:'12px',borderRadius:11,cursor:'pointer',textAlign:'left',
                          background:servico===s.id?'rgba(204,255,0,.12)':'rgba(255,255,255,.03)',
                          border:`2px solid ${servico===s.id?'rgba(204,255,0,.5)':'rgba(255,255,255,.08)'}`}}>
                        <div style={{fontSize:22,marginBottom:3}}>{s.emoji}</div>
                        <div style={{fontSize:12,fontWeight:700,color:servico===s.id?'var(--acid)':'var(--txt)'}}>{s.nome}</div>
                        {s.descricao&&<div style={{fontSize:10,color:'var(--dim)',margin:'2px 0'}}>{s.descricao}</div>}
                        <div style={{fontSize:14,fontWeight:700,color:'var(--acid)',marginTop:2}}>R$ {precoServ}</div>
                      </button>
                    );
                  })}
                </div>

                <div style={{marginBottom:12}}>
                  <label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:6,textTransform:'uppercase'}}>Valor R$</label>
                  <input type="number" min="0" step="5" value={valor} onChange={e=>setValor(Number(e.target.value)||0)}
                    style={{width:'100%',background:'rgba(0,0,0,.35)',border:'1px solid rgba(204,255,0,.3)',borderRadius:8,padding:'10px',fontSize:24,fontFamily:'JetBrains Mono,monospace',fontWeight:700,color:'var(--acid)',outline:'none',textAlign:'center'}}/>
                </div>

                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:6,textTransform:'uppercase'}}>Observação</label>
                  <input type="text" value={obs} onChange={e=>setObs(e.target.value)} placeholder="Ex: risco lateral, carro molhado…" className="fi"/>
                </div>
              </>
            )}

            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setStep(2)} style={{padding:'10px 14px',borderRadius:9,fontSize:13,cursor:'pointer',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.1)',color:'var(--dim)'}}>← Voltar</button>
              <button onClick={()=>setStep(4)} disabled={!servico}
                style={{flex:1,padding:'10px',borderRadius:9,fontSize:13,fontWeight:700,cursor:!servico?'not-allowed':'pointer',opacity:!servico?.5:1,background:'linear-gradient(135deg,rgba(0,229,255,.18),rgba(0,229,255,.08))',border:'1px solid rgba(0,229,255,.4)',color:'var(--neon)'}}>
                Próximo →
              </button>
            </div>
          </div>
        )}

        {/* ═══ PASSO 4: CONFIRMAR ═══ */}
        {step===4&&(
          <div>
            <div style={{background:'rgba(76,175,80,.05)',border:'1px solid rgba(76,175,80,.2)',borderRadius:13,padding:16,marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:'#4caf50',marginBottom:12,textTransform:'uppercase',letterSpacing:'.05em'}}>Resumo da OS</div>
              <div style={{display:'flex',flexDirection:'column',gap:9}}>
                {(clienteSel||showNovoCliente)&&(
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:16,flexShrink:0}}>👤</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:'var(--txt)'}}>{clienteSel?.nome||(nomeNovo||'Novo cliente')}</div>
                      {(clienteSel?.telefone||telNovo)&&<div style={{fontSize:11,color:'#25d366'}}>📱 {clienteSel?.telefone||telNovo}</div>}
                    </div>
                  </div>
                )}
                {placaResult&&(
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:16,flexShrink:0}}>{cat?.emoji||'🚗'}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:'var(--txt)'}}>{fmtDisp(cleanP(plate))} · {placaResult.data.marca} {placaResult.data.modelo}</div>
                      <div style={{fontSize:11,color:cat?.color}}>{cat?.label}</div>
                    </div>
                  </div>
                )}
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:16,flexShrink:0}}>{sv.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--txt)'}}>{sv.nome}</div>
                    {obs&&<div style={{fontSize:11,color:'var(--dim)'}}>📝 {obs}</div>}
                    {usarPlano&&<div style={{fontSize:11,color:'var(--neon)'}}>📋 Usando plano — R$ 0</div>}
                  </div>
                  <div style={{fontFamily:'Bebas Neue,cursive',fontSize:28,color:'var(--acid)',flexShrink:0}}>R$ {valor}</div>
                </div>
              </div>
            </div>

            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setStep(3)} style={{padding:'10px 14px',borderRadius:9,fontSize:13,cursor:'pointer',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.1)',color:'var(--dim)'}}>← Voltar</button>
              <button onClick={confirmar} disabled={saving}
                style={{flex:1,padding:'13px',borderRadius:12,fontSize:14,fontWeight:700,cursor:saving?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                  background:'linear-gradient(135deg,rgba(204,255,0,.25),rgba(204,255,0,.1))',border:'2px solid rgba(204,255,0,.5)',color:'var(--acid)'}}>
                {saving?<span style={{width:16,height:16,border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block',animation:'spin .9s linear infinite'}}/>:'🧾'}
                {saving?'Abrindo…':'Confirmar OS'+(clienteSel?.telefone||telNovo?' + 📱':'')}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}



/* ─── OS SCREEN ──────────────────────────────────────────── */
function OSScreen({cats, config}) {
  const [os,      setOs]      = useState([]);
  const [loading, setLoading] = useState(true);
  const [upd,     setUpd]     = useState({});
  const timer = useRef(null);
  useEffect(()=>{ fetchOs(); timer.current=setInterval(fetchOs,30000); return()=>clearInterval(timer.current); },[]);
  async function fetchOs() {
    try{ const r=await fetch('/api/os?action=fila'); if(!r.ok)return; const d=await r.json(); setOs(d.rows||[]); }
    catch(e){console.error(e);} finally{setLoading(false);}
  }
  async function avancar(item, novoStatus) {
    setUpd(u=>({...u,[item.id]:true}));
    try{
      await fetch('/api/os?id='+item.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:novoStatus})});
      setOs(o=>o.map(x=>x.id===item.id?{...x,status:novoStatus}:x));
      if (novoStatus==='pronto'&&item.telefone) enviarWhats('saida',{telefone:item.telefone,placa:item.placa,marca:item.marca,modelo:item.modelo,cor:item.cor,servico:item.servico,valor:item.valor},config);
    }catch(e){console.error(e);} finally{setUpd(u=>({...u,[item.id]:false}));}
  }
  async function cancelar(id) {
    if (!confirm('Cancelar esta OS?')) return;
    await fetch('/api/os?id='+id,{method:'DELETE'});
    setOs(o=>o.map(x=>x.id===id?{...x,status:'cancelado'}:x));
  }
  const ativos     = os.filter(o=>['aguardando','em_lavagem'].includes(o.status));
  const finalizados= os.filter(o=>o.status==='pronto');
  const totalDia   = finalizados.reduce((s,o)=>s+(o.valor||0),0);
  return (
    <div style={{padding:'14px 16px 88px',maxWidth:640,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <div><div style={{fontFamily:'Bebas Neue,cursive',fontSize:28,color:'var(--neon)',letterSpacing:'.05em'}}>FILA DO DIA</div><div style={{fontSize:12,color:'var(--dim)',marginTop:2}}>Atualiza a cada 30s</div></div>
        <button onClick={fetchOs} style={{padding:'7px 14px',borderRadius:8,fontSize:12,cursor:'pointer',background:'rgba(0,229,255,.1)',border:'1px solid rgba(0,229,255,.25)',color:'var(--neon)'}}>↺</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
        {[['Fila',ativos.length,'var(--neon)'],['Prontos',finalizados.length,'#4caf50'],['Total','R$'+totalDia,'var(--acid)']].map(([lb,val,cor])=>(<div key={lb} style={{background:'var(--s2)',borderRadius:10,padding:'10px 12px',border:'1px solid var(--bdr)',textAlign:'center'}}><div style={{fontFamily:'Bebas Neue,cursive',fontSize:24,color:cor,lineHeight:1}}>{val}</div><div style={{fontSize:11,color:'var(--dim)',marginTop:2}}>{lb}</div></div>))}
      </div>
      {loading&&<div style={{textAlign:'center',padding:'32px',color:'var(--dim)'}}>Carregando…</div>}
      {ativos.length>0&&(
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--neon)',textTransform:'uppercase',letterSpacing:'.08em',padding:'4px 0',marginBottom:8,borderBottom:'1px solid rgba(0,229,255,.15)'}}>Em andamento — {ativos.length}</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {ativos.map(o=>{
              const st=STATUS_CFG[o.status]||STATUS_CFG.aguardando;
              const cat=o.categoria_id&&cats[o.categoria_id];
              const sv=SERVICOS.find(s=>s.id===o.servico);
              return (
                <div key={o.id} style={{background:'var(--s1)',border:'2px solid '+st.color+'40',borderRadius:12,padding:'12px 14px'}}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:10}}>
                    <span style={{fontSize:22,lineHeight:1,marginTop:2}}>{st.emoji}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap',marginBottom:3}}>
                        <span style={{fontFamily:'JetBrains Mono,monospace',fontWeight:700,fontSize:16,color:'var(--neon)'}}>{fmtDisp(o.placa)}</span>
                        <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:st.color+'20',border:'1px solid '+st.color+'40',color:st.color,fontWeight:600}}>{st.label}</span>
                        {cat&&<span style={{fontSize:11,padding:'2px 7px',borderRadius:20,background:cat.color+'15',border:'1px solid '+cat.color+'30',color:cat.color}}>{cat.emoji} {cat.label}</span>}
                      </div>
                      <div style={{fontSize:13,color:'var(--txt)',marginBottom:2}}>{o.marca} {o.modelo}{o.cor?' — '+o.cor:''}</div>
                      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                        <span style={{fontSize:11,color:'var(--dim)'}}>{sv?.emoji} {sv?.label}</span>
                        {o.nome_cliente&&<span style={{fontSize:11,color:'var(--txt)',fontWeight:500}}>👤 {o.nome_cliente}</span>}
                        {o.telefone&&<span style={{fontSize:11,color:'#25d366'}}>📱</span>}
                        {o.obs&&<span style={{fontSize:11,color:'var(--dim)'}}>📝 {o.obs}</span>}
                      </div>
                    </div>
                    <div style={{fontFamily:'Bebas Neue,cursive',fontSize:28,color:'var(--acid)',flexShrink:0}}>R$ {o.valor}</div>
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    {st.btn&&<button onClick={()=>avancar(o,st.next)} disabled={!!upd[o.id]} style={{flex:1,padding:'9px',borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer',background:o.status==='aguardando'?'rgba(0,229,255,.15)':'rgba(76,175,80,.15)',border:'1px solid '+(o.status==='aguardando'?'rgba(0,229,255,.4)':'rgba(76,175,80,.4)'),color:o.status==='aguardando'?'var(--neon)':'#4caf50'}}>{upd[o.id]?'…':st.btn}{o.status==='em_lavagem'&&o.telefone?' 📱':''}</button>}
                    {o.telefone&&<button onClick={()=>enviarWhats('entrada',{telefone:o.telefone,placa:o.placa,marca:o.marca,modelo:o.modelo,cor:o.cor,servico:o.servico,valor:o.valor},config)} style={{padding:'9px 12px',borderRadius:8,fontSize:14,cursor:'pointer',background:'rgba(37,211,102,.1)',border:'1px solid rgba(37,211,102,.3)',color:'#25d366'}}>📱</button>}
                    <button onClick={()=>cancelar(o.id)} style={{padding:'9px 12px',borderRadius:8,fontSize:12,cursor:'pointer',background:'rgba(244,67,54,.08)',border:'1px solid rgba(244,67,54,.2)',color:'#f44336'}}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {finalizados.length>0&&(
        <div>
          <div style={{fontSize:12,fontWeight:700,color:'#4caf50',textTransform:'uppercase',letterSpacing:'.08em',padding:'4px 0',marginBottom:8,borderBottom:'1px solid rgba(76,175,80,.2)'}}>Prontos — {finalizados.length}</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {finalizados.map(o=>{
              const cat=o.categoria_id&&cats[o.categoria_id];
              const sv=SERVICOS.find(s=>s.id===o.servico);

/* ─── CAIXA DO DIA ───────────────────────────────────────── */

  const [loading,setLoading]=useState(true);
  useEffect(()=>{ fetchCaixa(); },[data]);

    setLoading(true);
    try{ const r=await fetch('/api/os?action=caixa&data='+data); if(!r.ok)return; setCaixa(await r.json()); }
    catch(e){console.error(e);} finally{setLoading(false);}

    <div style={{padding:'14px 16px 88px',maxWidth:640,margin:'0 auto'}}>

          {[['Hoje',0],['Ontem',-1],['7 dias',-7]].map(([lb,offset])=>{

              <button key={lb} onClick={()=>setData(dStr)} style={{flex:1,padding:'7px',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',

                border:`1px solid ${ativo?'rgba(204,255,0,.4)':'rgba(255,255,255,.09)'}`,
                color:ativo?'var(--acid)':'var(--dim)'}}>
                {lb}
              </button>
            );
          })}
        </div>
        <input type="date" value={data} onChange={e=>setData(e.target.value)} style={{background:'var(--s2)',border:'1px solid var(--bdr)',borderRadius:8,padding:'8px 12px',color:'var(--txt)',fontSize:13,outline:'none',width:'100%'}}/>

              <div style={{fontSize:12,fontWeight:700,color:'var(--txt)',marginBottom:12,textTransform:'uppercase',letterSpacing:'.05em'}}>Por tipo de serviço</div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {Object.entries(caixa.porServico).map(([sv,info])=>{
                  const s=SERVICOS.find(x=>x.id===sv)||{emoji:'💧',label:sv};

/* ─── CLIENTE FORM MODAL ─────────────────────────────────── */
function ClienteFormModal({inicial, onClose, onSaved}) {
  const isEdit=!!inicial;
  const [form,setForm]=useState({nome:inicial?.nome||'',telefone:inicial?.telefone||'',placas:(inicial?.placas||[]).join(', '),obs:inicial?.obs||''});
  const [saving,setSaving]=useState(false);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  async function salvarCli() {
    if (!form.nome) return; setSaving(true);
    try{
      const placas=form.placas.split(',').map(p=>p.trim().replace(/[^A-Z0-9]/gi,'').toUpperCase()).filter(Boolean);
      await fetch('/api/clientes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:inicial?.id,nome:form.nome,telefone:form.telefone.replace(/\D/g,''),placas,obs:form.obs})});

    }catch(e){console.error(e);} finally{setSaving(false);}

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="up" style={{width:'100%',maxWidth:480,background:'var(--s1)',border:'1px solid var(--bdr)',borderRadius:20,padding:24,maxHeight:'88vh',overflowY:'auto'}}>

        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Nome *</label><input type="text" value={form.nome} onChange={e=>sf('nome',e.target.value)} placeholder="Ex: João Silva" className="fi"/></div>

          <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Observação</label><input type="text" value={form.obs} onChange={e=>sf('obs',e.target.value)} placeholder="Ex: Prefere terças" className="fi"/></div>
        </div>
        <button onClick={salvarCli} disabled={saving||!form.nome} style={{width:'100%',marginTop:20,padding:13,borderRadius:12,fontWeight:700,fontSize:14,cursor:!form.nome?'not-allowed':'pointer',opacity:!form.nome?.4:1,background:'linear-gradient(135deg,rgba(0,229,255,.18),rgba(0,229,255,.08))',border:'1px solid rgba(0,229,255,.4)',color:'var(--neon)'}}>
          {saving?'Salvando…':isEdit?'💾 Salvar':'✓ Cadastrar'}
        </button>
      </div>
    </div>
  );
}


/* ─── ASSINAR PLANO MODAL ───────────────────────────────── */
function AssinarPlanoModal({cliente, assinaturaAtual, onClose, onSaved}) {
  const [planos,  setPlanos]  = useState([]);
  const [loading, setLoading] = useState(true);
  const [selecionado, setSelecionado] = useState(null);
  const [saving, setSaving] = useState(false);

    fetch('/api/planos').then(r=>r.json()).then(d=>{ setPlanos(Array.isArray(d)?d:[]); }).catch(()=>{}).finally(()=>setLoading(false));
  },[]);

  async function confirmar() {
    if (!selecionado) return;
    setSaving(true);
    try {
      await fetch('/api/planos?action=assinar', {

        {loading&&<div style={{textAlign:'center',padding:'24px',color:'var(--dim)'}}>Carregando…</div>}

            <div style={{fontSize:36,opacity:.2,marginBottom:8}}>📋</div>
            <div style={{fontSize:13,color:'var(--dim)'}}>Nenhum plano cadastrado ainda</div>
          </div>

              display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderRadius:12,cursor:'pointer',textAlign:'left',
              background:selecionado===p.id?'rgba(124,77,255,.12)':'rgba(255,255,255,.03)',
              border:`2px solid ${selecionado===p.id?'rgba(124,77,255,.5)':'rgba(255,255,255,.08)'}`,
            }}>
              <span style={{fontSize:24}}>📋</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13,color:selecionado===p.id?'#7c4dff':'var(--txt)'}}>{p.nome}</div>
                <div style={{fontSize:11,color:'var(--dim)'}}>{p.qtd_lavagens} lavagens/mês</div>

  );

/* ─── PLANOS SCREEN ──────────────────────────────────────── */
function PlanosScreen() {
  const [planos,setPlanos]=useState([]);
  const [contagem,setContagem]=useState({});
  const [loading,setLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({nome:'',qtd_lavagens:8,valor:0,servico:'simples',descricao:''});
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  useEffect(()=>{ fetchPl(); fetchContagem(); },[]);
  async function fetchContagem(){
    try{
      const r=await fetch('/api/planos?action=assinaturas_ativas');
      const rows=await r.json();
      const map={};
      if(Array.isArray(rows)) rows.forEach(a=>{ map[a.plano_id]=(map[a.plano_id]||0)+1; });
      setContagem(map);
    }catch(e){}
  }
  async function fetchPl(){ setLoading(true); try{ const r=await fetch('/api/planos'); setPlanos(await r.json()||[]); }catch(e){console.error(e);}finally{setLoading(false);} }
  async function salvarPl(){ if(!form.nome||!form.valor)return; setSaving(true); try{ await fetch('/api/planos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(form)}); await fetchPl(); setShowForm(false); setForm({nome:'',qtd_lavagens:8,valor:0,servico:'simples',descricao:''}); }catch(e){console.error(e);}finally{setSaving(false);} }
  async function deletarPl(id){ if(!confirm('Remover plano?'))return; await fetch('/api/planos?id='+id,{method:'DELETE'}); setPlanos(p=>p.filter(x=>x.id!==id)); }
  return (
    <div style={{padding:'14px 16px 88px',maxWidth:640,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div><div style={{fontFamily:'Bebas Neue,cursive',fontSize:28,color:'var(--neon)',letterSpacing:'.05em'}}>PLANOS MENSAIS</div><div style={{fontSize:12,color:'var(--dim)',marginTop:2}}>Pacotes de lavagem</div></div>
        <button onClick={()=>setShowForm(true)} style={{padding:'8px 14px',borderRadius:9,fontSize:12,fontWeight:700,cursor:'pointer',background:'linear-gradient(135deg,rgba(0,229,255,.18),rgba(0,229,255,.08))',border:'1px solid rgba(0,229,255,.4)',color:'var(--neon)'}}>+ Novo</button>
      </div>
      {loading&&<div style={{textAlign:'center',padding:'32px',color:'var(--dim)'}}>Carregando…</div>}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {planos.map(p=>{
          const sv=SERVICOS.find(s=>s.id===p.servico)||{emoji:'💧',label:p.servico};
          const vlLav=p.qtd_lavagens>0?Math.round(p.valor/p.qtd_lavagens):0;
          return (<div key={p.id} style={{background:'var(--s1)',border:'1px solid rgba(0,229,255,.15)',borderRadius:13,padding:'14px 16px'}}><div style={{display:'flex',alignItems:'flex-start',gap:12}}><div style={{width:48,height:48,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,229,255,.1)',border:'1px solid rgba(0,229,255,.2)',fontSize:22,flexShrink:0}}>📋</div><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14,color:'var(--txt)',marginBottom:4}}>{p.nome}</div><div style={{display:'flex',gap:8,flexWrap:'wrap'}}><span className="chip chip-blue">{p.qtd_lavagens} lav./mês</span><span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',color:'var(--dim)'}}>{sv.emoji} {sv.label}</span><span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',color:'var(--dim)'}}>R$ {vlLav}/lav.</span></div>{p.descricao&&<div style={{fontSize:11,color:'var(--dim)',marginTop:4}}>{p.descricao}</div>}</div><div style={{textAlign:'right',flexShrink:0}}><div style={{fontFamily:'Bebas Neue,cursive',fontSize:28,color:'var(--acid)',lineHeight:1}}>R$ {p.valor}</div><div style={{fontSize:10,color:'var(--dim)'}}>por mês</div></div></div><div style={{marginTop:12,paddingTop:12,borderTop:'1px solid rgba(255,255,255,.05)'}}><button onClick={()=>deletarPl(p.id)} style={{padding:'6px 14px',borderRadius:7,fontSize:11,cursor:'pointer',background:'rgba(244,67,54,.07)',border:'1px solid rgba(244,67,54,.2)',color:'#f44336'}}>🗑 Remover</button></div></div>);
        })}
        {!loading&&planos.length===0&&<div style={{textAlign:'center',padding:'48px 0'}}><div style={{fontSize:48,marginBottom:12,opacity:.2}}>📋</div><div style={{fontSize:14,color:'var(--dim)'}}>Nenhum plano cadastrado</div></div>}
      </div>
      {showForm&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="up" style={{width:'100%',maxWidth:480,background:'var(--s1)',border:'1px solid var(--bdr)',borderRadius:20,padding:24,maxHeight:'88vh',overflowY:'auto'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}><div style={{fontFamily:'Bebas Neue,cursive',fontSize:24,color:'var(--neon)'}}>NOVO PLANO</div><button onClick={()=>setShowForm(false)} style={{padding:8,borderRadius:8,background:'rgba(255,255,255,.05)',border:'none',cursor:'pointer',color:'var(--dim)',fontSize:18}}>✕</button></div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Nome *</label><input type="text" value={form.nome} onChange={e=>sf('nome',e.target.value)} placeholder="Ex: Mensal Básico" className="fi"/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Lavagens/mês</label><input type="number" min="1" value={form.qtd_lavagens} onChange={e=>sf('qtd_lavagens',parseInt(e.target.value)||1)} className="fi"/></div>
                <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Valor R$</label><input type="number" min="0" value={form.valor} onChange={e=>sf('valor',parseInt(e.target.value)||0)} className="fi" style={{fontFamily:'JetBrains Mono,monospace',fontWeight:700,color:'var(--acid)'}}/></div>
              </div>
              <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Serviço</label><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>{SERVICOS.map(s=>(<button key={s.id} onClick={()=>sf('servico',s.id)} style={{padding:'8px',borderRadius:8,fontSize:12,cursor:'pointer',textAlign:'left',background:form.servico===s.id?'rgba(0,229,255,.12)':'rgba(255,255,255,.04)',border:'1px solid '+(form.servico===s.id?'rgba(0,229,255,.4)':'rgba(255,255,255,.09)'),color:form.servico===s.id?'var(--neon)':'var(--dim)'}}>{s.emoji} {s.label}</button>))}</div></div>
              <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Descrição</label><input type="text" value={form.descricao} onChange={e=>sf('descricao',e.target.value)} placeholder="Ex: Inclui aspiração" className="fi"/></div>
            </div>
            <button onClick={salvarPl} disabled={saving||!form.nome||!form.valor} style={{width:'100%',marginTop:20,padding:13,borderRadius:12,fontWeight:700,fontSize:14,cursor:'pointer',background:'linear-gradient(135deg,rgba(0,229,255,.18),rgba(0,229,255,.08))',border:'1px solid rgba(0,229,255,.4)',color:'var(--neon)'}}>{saving?'Salvando…':'✓ Criar Plano'}</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── MODELOS SCREEN ─────────────────────────────────────── */
function ModelosScreen({cats}) {
  const SEGMENTOS = [
    {id:'',   label:'Todos'},
    {id:'1',  label:'🚗 Automóvel'},
    {id:'2',  label:'🛻 Utilitário'},
    {id:'3',  label:'🚛 Caminhão'},
    {id:'4',  label:'🚍 Ônibus'},
    {id:'5',  label:'🚜 Máquina'},
    {id:'6',  label:'🏍️ Moto'},
    {id:'7',  label:'🔧 Implemento'},
  ];

  const [rows,       setRows]       = useState([]);
  const [total,      setTotal]      = useState(0);
  const [pages,      setPages]      = useState(1);
  const [page,       setPage]       = useState(1);
  const [busca,      setBusca]      = useState('');
  const [catFiltro,  setCatFiltro]  = useState('');   // '' = todas, 'SEM' = sem categoria
  const [segFiltro,  setSegFiltro]  = useState('');   // '' = todos
  const [ordem,      setOrdem]      = useState('az'); // az | za | cat
  const [loading,    setLoading]    = useState(true);
  const [saving,     setSaving]     = useState({});
  const [saved,      setSaved]      = useState({});
  const timer = useRef(null);

  useEffect(()=>{ loadMod(1); },[busca, catFiltro, segFiltro, ordem]);

  async function loadMod(pg) {
    setLoading(true);
    try {
      const p = new URLSearchParams({page:pg, ordem});
      if (busca)     p.append('busca',   busca);
      if (catFiltro) p.append('cat',     catFiltro);
      if (segFiltro) p.append('seg',     segFiltro);
      const r = await fetch('/api/modelos?'+p);
      const d = await r.json();
      const rowsData = Array.isArray(d?.rows) ? d.rows : [];
      setRows(rowsData);
      setTotal(d?.total||0);
      setPages(d?.pages||1);
      setPage(pg);
    } catch(e){console.error(e);}
    finally{setLoading(false);}
  }

  function handleBusca(v) {
    setBusca(v);
    clearTimeout(timer.current);
    timer.current = setTimeout(()=>loadMod(1), 400);
  }

  async function handleChange(row, novaCatId) {
    const subId   = row.sub_segmentos?.id || row.fk_sub_segmento;
    const subNome = row.sub_segmentos?.nome || '';
    const novaCat = cats[novaCatId];
    if (!subId || !novaCat) return;
    const aplicar = subNome
      ? confirm('Aplicar "'+novaCat.label+'" para TODOS os modelos do grupo "'+subNome+'"?')
      : true;
    setRows(prev=>prev.map(x=>{
      if (aplicar ? x.fk_sub_segmento===subId : x.id===row.id)
        return {...x, sub_segmentos:{...x.sub_segmentos, categoria_id:novaCatId}};
      return x;
    }));
    setSaving(s=>({...s,[subId]:true}));
    try {
      await fetch('/api/modelos',{method:'PATCH',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({sub_segmento_id:subId, categoria_id:novaCatId})});
      setSaved(s=>({...s,[subId]:true}));
      setTimeout(()=>setSaved(s=>({...s,[subId]:false})),2000);
    } catch(e){console.error(e);}
    finally{setSaving(s=>({...s,[subId]:false}));}
  }

  const catOptions = [
    {id:'',    label:'Todas categorias'},
    {id:'SEM', label:'⚠️ Sem categoria'},
    ...Object.values(cats).map(c=>({id:c.id, label:c.emoji+' '+c.label})),
  ];

  return (
    <div style={{padding:'14px 16px 88px',maxWidth:640,margin:'0 auto'}}>
      {/* Header */}
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:'Bebas Neue,cursive',fontSize:28,color:'var(--neon)',letterSpacing:'.05em'}}>MODELOS</div>
        <div style={{fontSize:12,color:'var(--dim)',marginTop:2}}>
          {loading?'Carregando…':(total.toLocaleString('pt-BR')+' modelos'+(busca?' · "'+busca+'"':''))}
        </div>
      </div>

      {/* Busca */}
      <input type="text" value={busca} onChange={e=>handleBusca(e.target.value)}
        placeholder="🔍 Buscar modelo... ex: CRETA, GOL, HILUX"
        className="fi" style={{marginBottom:10}}/>

      {/* Filtros em linha */}
      <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
        {/* Filtro categoria */}
        <select value={catFiltro} onChange={e=>{setCatFiltro(e.target.value);}}
          style={{flex:1,minWidth:120,background:'var(--s2)',border:'1px solid rgba(255,255,255,.12)',borderRadius:8,padding:'7px 10px',fontSize:12,color:'var(--txt)',outline:'none',cursor:'pointer'}}>
          {catOptions.map(o=>(<option key={o.id} value={o.id}>{o.label}</option>))}
        </select>

        {/* Filtro segmento */}
        <select value={segFiltro} onChange={e=>{setSegFiltro(e.target.value);}}
          style={{flex:1,minWidth:110,background:'var(--s2)',border:'1px solid rgba(255,255,255,.12)',borderRadius:8,padding:'7px 10px',fontSize:12,color:'var(--txt)',outline:'none',cursor:'pointer'}}>
          {SEGMENTOS.map(o=>(<option key={o.id} value={o.id}>{o.label}</option>))}
        </select>

        {/* Ordenação */}
        <select value={ordem} onChange={e=>{setOrdem(e.target.value);}}
          style={{background:'var(--s2)',border:'1px solid rgba(255,255,255,.12)',borderRadius:8,padding:'7px 10px',fontSize:12,color:'var(--txt)',outline:'none',cursor:'pointer'}}>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="cat">Por categoria</option>
        </select>
      </div>

      {/* Chips de filtros ativos */}
      {(catFiltro||segFiltro||busca)&&(
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
          {busca&&<span onClick={()=>setBusca('')} className="chip chip-blue" style={{cursor:'pointer'}}>🔍 "{busca}" ✕</span>}
          {catFiltro&&<span onClick={()=>setCatFiltro('')} className="chip chip-yellow" style={{cursor:'pointer'}}>{catOptions.find(c=>c.id===catFiltro)?.label} ✕</span>}
          {segFiltro&&<span onClick={()=>setSegFiltro('')} className="chip chip-blue" style={{cursor:'pointer'}}>{SEGMENTOS.find(sg=>sg.id===segFiltro)?.label} ✕</span>}
          <span onClick={()=>{setBusca('');setCatFiltro('');setSegFiltro('');}} style={{fontSize:11,color:'var(--dim)',cursor:'pointer',padding:'2px 8px',borderRadius:20,border:'1px solid rgba(255,255,255,.08)'}}>Limpar tudo</span>
        </div>
      )}

      {/* Loading */}
      {loading&&(
        <div style={{textAlign:'center',padding:'32px',color:'var(--dim)'}}>
          <div style={{display:'flex',justifyContent:'center',gap:7,marginBottom:8}}>
            {[0,180,360].map(d=>(<div key={d} className="blink" style={{width:8,height:8,borderRadius:'50%',background:'var(--neon)',animationDelay:d+'ms'}}/>))}
          </div>
          Carregando…
        </div>
      )}

      {/* Vazio */}
      {!loading&&rows.length===0&&(
        <div style={{textAlign:'center',padding:'48px 0'}}>
          <div style={{fontSize:40,opacity:.18,marginBottom:10}}>🔍</div>
          <div style={{fontSize:14,color:'var(--dim)'}}>Nenhum modelo encontrado</div>
          {(busca||catFiltro||segFiltro)&&(
            <button onClick={()=>{setBusca('');setCatFiltro('');setSegFiltro('');}}
              style={{marginTop:12,padding:'8px 16px',borderRadius:8,fontSize:12,cursor:'pointer',background:'rgba(0,229,255,.1)',border:'1px solid rgba(0,229,255,.25)',color:'var(--neon)'}}>
              Limpar filtros
            </button>
          )}
        </div>
      )}

      {/* Lista */}
      <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
        {rows.map(row=>{
          const subId   = row.sub_segmentos?.id || row.fk_sub_segmento;
          const catId   = row.sub_segmentos?.categoria_id;
          const cat     = catId && cats[catId];
          return (
            <div key={row.id} style={{background:'var(--s1)',border:'1px solid '+(cat?cat.color+'28':'rgba(255,193,7,.15)'),borderRadius:10,padding:'10px 14px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:20,flexShrink:0}}>{cat?.emoji||'❓'}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:'var(--txt)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.modelo}</div>
                {row.sub_segmentos?.nome&&(
                  <div style={{fontSize:11,color:'var(--dim)',marginTop:1}}>📂 {row.sub_segmentos.nome}</div>
                )}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                {saved[subId]&&<span style={{fontSize:14,color:'#4caf50'}}>✓</span>}
                {saving[subId]&&<span style={{width:12,height:12,border:'2px solid var(--neon)',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block',animation:'spin .9s linear infinite'}}/>}
                <select value={catId||''} onChange={e=>handleChange(row,e.target.value)}
                  style={{background:'var(--s2)',border:'1px solid '+(cat?cat.color+'60':'rgba(255,193,7,.4)'),borderRadius:7,padding:'5px 8px',fontSize:12,fontWeight:600,color:cat?cat.color:'#ffc107',outline:'none',cursor:'pointer',maxWidth:130}}>
                  <option value="">— sem cat —</option>
                  {Object.values(cats).map(c=>(<option key={c.id} value={c.id}>{c.emoji} {c.label}</option>))}
                </select>
              </div>
            </div>
          );
        })}
      </div>

      {/* Paginação */}
      {pages>1&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
          <button onClick={()=>loadMod(Math.max(1,page-1))} disabled={page===1||loading}
            style={{padding:'8px 16px',borderRadius:8,fontSize:13,cursor:page===1?'not-allowed':'pointer',opacity:page===1?.4:1,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',color:'var(--dim)'}}>
            ← Anterior
          </button>
          <span style={{fontSize:12,color:'var(--dim)'}}>{page} / {pages} · {total.toLocaleString('pt-BR')}</span>
          <button onClick={()=>loadMod(Math.min(pages,page+1))} disabled={page===pages||loading}
            style={{padding:'8px 16px',borderRadius:8,fontSize:13,cursor:page===pages?'not-allowed':'pointer',opacity:page===pages?.4:1,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',color:'var(--dim)'}}>
            Próxima →
          </button>
        </div>
      )}
    </div>
  );
}



function PriceManager({cats, onReload}) {
  const [showForm, setShowForm] = useState(false);
  const [editando, setEditando] = useState(null);
  const [saving,   setSaving]   = useState({});
  const [deleting, setDeleting] = useState({});

  async function saveCat(data) {
    setSaving(s=>({...s,[data.id]:true}));
    try{
      await fetch('/api/categorias',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      await onReload(); setShowForm(false); setEditando(null);
    }catch(e){console.error(e);}finally{setSaving(s=>({...s,[data.id]:false}));}
  }

  async function delCat(id) {
    if(!confirm(`Remover "${id}"?`))return;
    setDeleting(s=>({...s,[id]:true}));
    try{await fetch(`/api/categorias?id=${id}`,{method:'DELETE'});await onReload();}
    catch(e){console.error(e);}finally{setDeleting(s=>({...s,[id]:false}));}
  }

  return (
    <div style={{padding:'0 16px 88px',maxWidth:640,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,paddingTop:4}}>
        <div>
          <div style={{fontSize:14,fontWeight:600,color:'var(--txt)'}}>Categorias de Preço</div>
          <div style={{fontSize:12,color:'var(--dim)',marginTop:2}}>{Object.keys(cats).length} categorias</div>
        </div>
        <button onClick={()=>{setEditando(null);setShowForm(true);}} style={{display:'flex',alignItems:'center',gap:5,padding:'8px 14px',borderRadius:9,fontSize:12,fontWeight:700,cursor:'pointer',background:'linear-gradient(135deg,rgba(0,229,255,.18),rgba(0,229,255,.08))',border:'1px solid rgba(0,229,255,.4)',color:'var(--neon)'}}>+ Nova</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
        {Object.values(cats).map(cat=>(
          <CatRowEdit key={cat.id} cat={cat} saving={!!saving[cat.id]} deleting={!!deleting[cat.id]}
            onEdit={()=>{setEditando({id:cat.id,label:cat.label,emoji:cat.emoji,descricao:cat.desc,cor:cat.color,preco:cat.preco,ordem:cat.ordem||99});setShowForm(true);}}
            onSavePreco={async preco=>{ await saveCat({id:cat.id,label:cat.label,emoji:cat.emoji,descricao:cat.desc,cor:cat.color,preco,ordem:cat.ordem||99}); }}
            onDelete={()=>delCat(cat.id)}/>
        ))}
      </div>
      {showForm&&<CatFormModal inicial={editando} saving={editando?!!saving[editando.id]:false} onClose={()=>{setShowForm(false);setEditando(null);}} onSave={saveCat} idsExistentes={Object.keys(cats)}/>}
    </div>
  );
}

function CatRowEdit({cat, saving, deleting, onEdit, onSavePreco, onDelete}) {
  const [preco,   setPreco]   = useState(cat.preco||0);
  const [changed, setChanged] = useState(false);
  const [ok,      setOk]      = useState(false);
  useEffect(()=>{setPreco(cat.preco||0);setChanged(false);},[cat.preco]);
  async function save(){await onSavePreco(preco);setChanged(false);setOk(true);setTimeout(()=>setOk(false),2000);}
  return (
    <div style={{background:'var(--s2)',border:`1px solid ${cat.color}28`,borderRadius:12,padding:'12px 14px'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:44,height:44,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',background:`${cat.color}18`,border:`1px solid ${cat.color}30`,flexShrink:0,fontSize:22}}>{cat.emoji}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:13,color:'var(--txt)'}}>{cat.label}</div>
          {cat.desc&&<div style={{fontSize:11,color:'var(--dim)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cat.desc}</div>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
          <span style={{fontSize:12,color:'var(--dim)'}}>R$</span>
          <input type="number" min="0" step="5" value={preco} onChange={e=>{setPreco(Number(e.target.value)||0);setChanged(true);setOk(false);}} style={{background:'rgba(0,0,0,.4)',border:`1px solid ${changed?cat.color+'90':cat.color+'40'}`,borderRadius:8,padding:'7px 9px',fontSize:14,fontFamily:'JetBrains Mono,monospace',fontWeight:700,color:cat.color,textAlign:'right',width:70,outline:'none'}}/>
          {changed&&<button onClick={save} style={{padding:'7px 10px',borderRadius:7,fontSize:11,fontWeight:700,cursor:'pointer',background:`${cat.color}20`,border:`1px solid ${cat.color}60`,color:cat.color}}>{saving?'…':'💾'}</button>}
          {ok&&<span style={{fontSize:16,color:'#4caf50'}}>✓</span>}
        </div>
      </div>
      <div style={{display:'flex',gap:7,marginTop:10,paddingTop:10,borderTop:'1px solid rgba(255,255,255,.05)'}}>
        <button onClick={onEdit} style={{flex:1,padding:'6px',borderRadius:7,fontSize:11,fontWeight:600,cursor:'pointer',background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',color:'var(--dim)'}}>✏️ Editar</button>
        <button onClick={onDelete} disabled={deleting} style={{padding:'6px 14px',borderRadius:7,fontSize:11,cursor:'pointer',background:'rgba(244,67,54,.07)',border:'1px solid rgba(244,67,54,.2)',color:'#f44336',opacity:deleting?.5:1}}>{deleting?'…':'🗑'}</button>
      </div>
    </div>
  );
}

const EMOJIS = ['🚗','🚐','🛻','🚛','🚌','🏍️','🚜','🚕','🏎️','🚙','🚑','🚒','🚐','⛟','🚚','🏗️','🚤','🛵','🛺','🚃'];

function CatFormModal({inicial, saving, onClose, onSave, idsExistentes}) {

  const s=(k,v)=>setForm(f=>({...f,[k]:v}));
  function handleId(v){const safe=v.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z0-9_]/g,'_').slice(0,20);s('id',safe);setErroId(!isEdit&&idsExistentes.includes(safe)?'ID já existe':'');}

          <div style={{flex:1}}><div style={{fontFamily:'Bebas Neue,cursive',fontSize:22,color:form.cor,lineHeight:1}}>{form.label||'Nome'}</div><div style={{fontSize:11,color:'var(--dim)'}}>{form.descricao||'Descrição'}</div></div>
          <div style={{fontFamily:'Bebas Neue,cursive',fontSize:28,color:form.cor}}>R$ {form.preco||0}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {!isEdit&&(<div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>ID único *</label><input type="text" value={form.id} onChange={e=>handleId(e.target.value)} placeholder="ex: ESPORTIVO" className="fi" style={{fontFamily:'JetBrains Mono,monospace',fontWeight:700,color:'var(--neon)',textTransform:'uppercase'}}/>{erroId&&<div style={{fontSize:11,color:'#f44336',marginTop:4}}>⚠️ {erroId}</div>}</div>)}
          <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Nome *</label><input type="text" value={form.label} onChange={e=>s('label',e.target.value)} placeholder="ex: Esportivo" className="fi"/></div>
          <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Descrição</label><input type="text" value={form.descricao||''} onChange={e=>s('descricao',e.target.value)} placeholder="ex: Carros esportivos" className="fi"/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Preço R$</label><input type="number" min="0" step="5" value={form.preco||0} onChange={e=>s('preco',parseInt(e.target.value)||0)} className="fi" style={{fontFamily:'JetBrains Mono,monospace',fontWeight:700,color:form.cor}}/></div>
            <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Ordem</label><input type="number" min="1" max="99" value={form.ordem||99} onChange={e=>s('ordem',parseInt(e.target.value)||99)} className="fi"/></div>
          </div>
          <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:8,textTransform:'uppercase'}}>Emoji</label><div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{EMOJIS.map(e=>(<button key={e} onClick={()=>s('emoji',e)} style={{width:36,height:36,borderRadius:8,fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',background:form.emoji===e?`${form.cor}25`:'rgba(255,255,255,.05)',border:`2px solid ${form.emoji===e?form.cor:'rgba(255,255,255,.08)'}`}}>{e}</button>))}<input type="text" value={form.emoji||''} onChange={e=>s('emoji',e.target.value.slice(-2))} className="fi" style={{width:60,textAlign:'center',fontSize:20}}/></div></div>
          <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:8,textTransform:'uppercase'}}>Cor</label><div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>{CORES.map(c=>(<button key={c} onClick={()=>s('cor',c)} style={{width:28,height:28,borderRadius:'50%',background:c,border:`3px solid ${form.cor===c?'white':'transparent'}`,cursor:'pointer',flexShrink:0}}/>))}<input type="color" value={form.cor||'#00e5ff'} onChange={e=>s('cor',e.target.value)} style={{width:36,height:28,borderRadius:6,border:'1px solid rgba(255,255,255,.2)',background:'transparent',cursor:'pointer',padding:2}}/></div></div>
