const VARIAVEIS_MSG = [
  {tag:'{nome_lavajato}', desc:'Nome do estabelecimento'},
  {tag:'{placa}',         desc:'Placa do veículo'},
  {tag:'{marca}',         desc:'Marca'},
  {tag:'{modelo}',        desc:'Modelo'},
  {tag:'{cor}',           desc:'Cor'},
  {tag:'{servico}',       desc:'Tipo de serviço'},
  {tag:'{valor}',         desc:'Valor da lavagem'},
];

function ConfiguracoesScreen({user, config, onConfigSaved}) {
  const [form, setForm] = useState({
    nome_lavajato: config?.nome_lavajato || '',
    endereco: config?.endereco || '',
    telefone_estabelecimento: config?.telefone_estabelecimento || '',
    msg_entrada: config?.msg_entrada || MSG_ENTRADA_DEFAULT,
    msg_saida: config?.msg_saida || MSG_SAIDA_DEFAULT,
  });
  const [saving, setSaving] = useState(false);
  const [saved,  setSaved]  = useState(false);
  const [campoFocado, setCampoFocado] = useState(null); // 'entrada' | 'saida' | null
  const refEntrada = useRef(null);
  const refSaida   = useRef(null);

  const sf = (k,v) => setForm(f=>({...f,[k]:v}));

  function inserirVariavel(tag) {
    const ref = campoFocado==='saida' ? refSaida : refEntrada;
    const campo = campoFocado==='saida' ? 'msg_saida' : 'msg_entrada';
    const el = ref.current;
    if (!el) { sf(campo, form[campo]+tag); return; }
    const start = el.selectionStart, end = el.selectionEnd;
    const novoTexto = form[campo].slice(0,start) + tag + form[campo].slice(end);
    sf(campo, novoTexto);
    setTimeout(()=>{ el.focus(); el.selectionStart = el.selectionEnd = start+tag.length; }, 0);
  }

  async function salvar() {
    setSaving(true);
    try {
      const { data: { session } } = await supabase.auth.getSession();
      const r = await fetch('/api/config', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+session.access_token },
        body: JSON.stringify(form),
      });
      const novoConfig = await r.json();
      onConfigSaved(novoConfig);
      setSaved(true);
      setTimeout(()=>setSaved(false), 2500);
    } catch(e){ console.error(e); }
    finally{ setSaving(false); }
  }

  return (
    <div style={{padding:'14px 16px 88px',maxWidth:640,margin:'0 auto'}}>
      <div style={{marginBottom:18}}>
        <div style={{fontFamily:'Bebas Neue,cursive',fontSize:28,color:'var(--neon)',letterSpacing:'.05em'}}>CONFIGURAÇÕES</div>
        <div style={{fontSize:12,color:'var(--dim)',marginTop:2}}>Personalize seu estabelecimento e mensagens</div>
      </div>

      {/* Dados do estabelecimento */}
      <div style={{background:'var(--s1)',borderRadius:13,padding:18,border:'1px solid var(--bdr)',marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--txt)',marginBottom:14,display:'flex',alignItems:'center',gap:6}}>
          🏪 Dados do Estabelecimento
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div>
            <label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Nome do lava-jato</label>
            <input type="text" value={form.nome_lavajato} onChange={e=>sf('nome_lavajato',e.target.value)} placeholder="Ex: Lava-Jato Estrela" className="fi"/>
          </div>
          <div>
            <label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Endereço</label>
            <input type="text" value={form.endereco} onChange={e=>sf('endereco',e.target.value)} placeholder="Ex: Rua das Flores, 123" className="fi"/>
          </div>
          <div>
            <label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Telefone do estabelecimento</label>
            <input type="tel" value={form.telefone_estabelecimento} onChange={e=>sf('telefone_estabelecimento',e.target.value.replace(/\D/g,''))} placeholder="44999999999" className="fi" style={{fontFamily:'JetBrains Mono,monospace'}}/>
          </div>
        </div>
      </div>

      {/* Variáveis disponíveis */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:'var(--dim)',fontWeight:600,marginBottom:8,textTransform:'uppercase'}}>Variáveis disponíveis — toque para inserir</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {VARIAVEIS_MSG.map(v=>(
            <button key={v.tag} onClick={()=>inserirVariavel(v.tag)} title={v.desc}
              style={{padding:'5px 10px',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',background:'rgba(0,229,255,.08)',border:'1px solid rgba(0,229,255,.25)',color:'var(--neon)',fontFamily:'JetBrains Mono,monospace'}}>
              {v.tag}
            </button>
          ))}
        </div>
      </div>

      {/* Mensagem de entrada */}
      <div style={{background:'var(--s1)',borderRadius:13,padding:18,border:'1px solid var(--bdr)',marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--txt)',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>
          ⏳ Mensagem de Entrada
        </div>
        <textarea ref={refEntrada} value={form.msg_entrada} onChange={e=>sf('msg_entrada',e.target.value)}
          onFocus={()=>setCampoFocado('entrada')}
          rows={7} className="fi" style={{resize:'vertical',fontFamily:'JetBrains Mono,monospace',fontSize:12,lineHeight:1.6}}/>
        <button onClick={()=>sf('msg_entrada', MSG_ENTRADA_DEFAULT)} style={{marginTop:8,fontSize:11,color:'var(--dim)',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Restaurar padrão</button>
      </div>

      {/* Mensagem de saída */}
      <div style={{background:'var(--s1)',borderRadius:13,padding:18,border:'1px solid var(--bdr)',marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--txt)',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>
          ✅ Mensagem de Saída
        </div>
        <textarea ref={refSaida} value={form.msg_saida} onChange={e=>sf('msg_saida',e.target.value)}
          onFocus={()=>setCampoFocado('saida')}
          rows={7} className="fi" style={{resize:'vertical',fontFamily:'JetBrains Mono,monospace',fontSize:12,lineHeight:1.6}}/>
        <button onClick={()=>sf('msg_saida', MSG_SAIDA_DEFAULT)} style={{marginTop:8,fontSize:11,color:'var(--dim)',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Restaurar padrão</button>
      </div>

      {/* Conta */}
      <div style={{background:'var(--s1)',borderRadius:13,padding:18,border:'1px solid var(--bdr)',marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--txt)',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>
          👤 Minha Conta
        </div>
        <div style={{fontSize:12,color:'var(--dim)'}}>Email: <span style={{color:'var(--txt)'}}>{user?.email}</span></div>
      </div>

      <button onClick={salvar} disabled={saving} style={{
        width:'100%',padding:14,borderRadius:12,fontWeight:700,fontSize:14,cursor:saving?'not-allowed':'pointer',
        display:'flex',alignItems:'center',justifyContent:'center',gap:8,
        background:saved?'rgba(76,175,80,.15)':'linear-gradient(135deg,rgba(204,255,0,.18),rgba(204,255,0,.08))',
        border:`1px solid ${saved?'rgba(76,175,80,.4)':'rgba(204,255,0,.4)'}`,
        color:saved?'#4caf50':'var(--acid)',
      }}>
        {saving?<span style={{width:16,height:16,border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block',animation:'spin .9s linear infinite'}}/>:null}
        {saved?'✓ Salvo!':saving?'Salvando…':'💾 Salvar Configurações'}
      </button>
    </div>
  );
}


/* ─── SERVICOS SCREEN (matriz categoria x servico) ───────── */
function ServicosScreen({cats}) {
  const [servicos,    setServicos]    = useState([]);
  const [precos,      setPrecos]      = useState({}); // key: "catId|servId" -> valor
  const [loading,     setLoading]     = useState(true);
  const [showForm,    setShowForm]    = useState(false);
  const [editandoServ,setEditandoServ]= useState(null);
  const [saving,      setSaving]      = useState({});
  const [saved,       setSaved]       = useState({});

  useEffect(()=>{ load(); },[]);

  async function load() {
    setLoading(true);
    try {
      const { data:{session} } = await supabase.auth.getSession();
      const auth = { Authorization:'Bearer '+session.access_token };

      const [rs, rp] = await Promise.all([
        fetch('/api/servicos', {headers:auth}),
        fetch('/api/servicos?action=precos', {headers:auth}),
      ]);
      const svs = await rs.json();
      const prs = await rp.json();

      setServicos(Array.isArray(svs)?svs:[]);
      const map = {};
      if (Array.isArray(prs)) prs.forEach(p=>{ map[p.categoria_id+'|'+p.servico_id] = p.valor; });
      setPrecos(map);
    } catch(e){console.error(e);}
    finally{setLoading(false);}
  }

  async function salvarPreco(catId, servId, valor) {
    const key = catId+'|'+servId;
    setPrecos(p=>({...p,[key]:valor}));
    setSaving(s=>({...s,[key]:true}));
    try {
      const { data:{session} } = await supabase.auth.getSession();
      await fetch('/api/servicos?action=preco', {
        method:'POST',
        headers:{'Content-Type':'application/json', Authorization:'Bearer '+session.access_token},
        body: JSON.stringify({ categoria_id:catId, servico_id:servId, valor }),
      });
      setSaved(s=>({...s,[key]:true}));
      setTimeout(()=>setSaved(s=>({...s,[key]:false})), 1500);
    } catch(e){console.error(e);}
    finally{setSaving(s=>({...s,[key]:false}));}
  }

  async function deletarServico(id) {
    if (!confirm('Remover este tipo de serviço?')) return;
    try {
      const { data:{session} } = await supabase.auth.getSession();
      await fetch('/api/servicos?id='+id, { method:'DELETE', headers:{Authorization:'Bearer '+session.access_token} });
      setServicos(s=>s.filter(x=>x.id!==id));
    } catch(e){console.error(e);}
  }

  const catList = Object.values(cats);

  return (
    <div style={{padding:'14px 16px 88px',maxWidth:640,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <div style={{fontFamily:'Bebas Neue,cursive',fontSize:28,color:'var(--neon)',letterSpacing:'.05em'}}>TIPOS DE SERVIÇO</div>
          <div style={{fontSize:12,color:'var(--dim)',marginTop:2}}>Defina o preço de cada serviço por categoria</div>
        </div>
        <button onClick={()=>{setEditandoServ(null);setShowForm(true);}} style={{padding:'8px 14px',borderRadius:9,fontSize:12,fontWeight:700,cursor:'pointer',background:'linear-gradient(135deg,rgba(0,229,255,.18),rgba(0,229,255,.08))',border:'1px solid rgba(0,229,255,.4)',color:'var(--neon)',flexShrink:0}}>+ Novo</button>
      </div>

      {loading&&<div style={{textAlign:'center',padding:'32px',color:'var(--dim)'}}>Carregando…</div>}

      {/* Lista de serviços com botão excluir */}
      {!loading&&(
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
          {servicos.map(s=>(
            <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,background:'var(--s1)',border:'1px solid var(--bdr)',borderRadius:11,padding:'10px 14px'}}>
              <span style={{fontSize:22}}>{s.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:'var(--txt)'}}>{s.nome}</div>
                {s.descricao&&<div style={{fontSize:11,color:'var(--dim)'}}>{s.descricao}</div>}
              </div>
              <button onClick={()=>deletarServico(s.id)} style={{padding:'6px 10px',borderRadius:7,fontSize:11,cursor:'pointer',background:'rgba(244,67,54,.07)',border:'1px solid rgba(244,67,54,.2)',color:'#f44336',flexShrink:0}}>🗑</button>
            </div>
          ))}
          {servicos.length===0&&(
            <div style={{textAlign:'center',padding:'32px 0'}}>
              <div style={{fontSize:36,opacity:.2,marginBottom:8}}>🧴</div>
              <div style={{fontSize:13,color:'var(--dim)'}}>Nenhum serviço cadastrado</div>
            </div>
          )}
        </div>
      )}

      {/* Matriz de preços */}
      {!loading&&servicos.length>0&&catList.length>0&&(
        <div>
          <div style={{fontSize:12,fontWeight:700,color:'var(--txt)',marginBottom:10,textTransform:'uppercase',letterSpacing:'.05em'}}>Preços por categoria</div>
          <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
            <div style={{minWidth:Math.max(380, 90+servicos.length*100)}}>
              {/* Header */}
              <div style={{display:'flex',gap:6,marginBottom:8,paddingLeft:90}}>
                {servicos.map(s=>(
                  <div key={s.id} style={{width:96,flexShrink:0,textAlign:'center',fontSize:11,fontWeight:700,color:'var(--dim)'}}>
                    <div style={{fontSize:16}}>{s.emoji}</div>
                    <div>{s.nome}</div>
                  </div>
                ))}
              </div>
              {/* Linhas por categoria */}
              {catList.map(cat=>(
                <div key={cat.id} style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
                  <div style={{width:90,flexShrink:0,display:'flex',alignItems:'center',gap:5}}>
                    <span style={{fontSize:16}}>{cat.emoji}</span>
                    <span style={{fontSize:11,color:cat.color,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cat.label}</span>
                  </div>
                  {servicos.map(s=>{
                    const key = cat.id+'|'+s.id;
                    const val = precos[key] ?? '';
                    return (
                      <div key={s.id} style={{width:96,flexShrink:0,position:'relative'}}>
                        <input type="number" min="0" step="5" value={val}
                          onChange={e=>setPrecos(p=>({...p,[key]:e.target.value}))}
                          onBlur={e=>salvarPreco(cat.id, s.id, Number(e.target.value)||0)}
                          placeholder="—"
                          style={{width:'100%',background:'var(--s2)',border:`1px solid ${saved[key]?'rgba(76,175,80,.5)':'rgba(255,255,255,.1)'}`,borderRadius:7,padding:'7px 6px',fontSize:12,fontFamily:'JetBrains Mono,monospace',fontWeight:700,color:saved[key]?'#4caf50':'var(--acid)',textAlign:'center',outline:'none'}}/>
                        {saving[key]&&<span style={{position:'absolute',top:-4,right:-4,width:10,height:10,border:'2px solid var(--neon)',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block',animation:'spin .9s linear infinite'}}/>}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
          <div style={{fontSize:11,color:'var(--dim)',marginTop:10}}>💡 Toque em uma célula vazia para definir o preço. Sai do campo para salvar automaticamente.</div>
        </div>
      )}

      {showForm&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <ServicoFormModal inicial={editandoServ} onClose={()=>setShowForm(false)} onSaved={()=>{setShowForm(false);load();}}/>
        </div>
      )}
    </div>
  );
}

function ServicoFormModal({inicial, onClose, onSaved}) {
  const [form, setForm] = useState({ nome:inicial?.nome||'', emoji:inicial?.emoji||'💧', descricao:inicial?.descricao||'', ordem:inicial?.ordem||99 });
  const [saving, setSaving] = useState(false);
  const sf = (k,v) => setForm(f=>({...f,[k]:v}));
  const EMOJIS_SERV = ['💧','✨','💎','🧹','🪣','🚿','🧽','🛁','⭐','🔥'];

  async function salvar() {
    if (!form.nome) return;
    setSaving(true);
    try {
      const { data:{session} } = await supabase.auth.getSession();
      await fetch('/api/servicos', {
        method:'POST',
        headers:{'Content-Type':'application/json', Authorization:'Bearer '+session.access_token},
        body: JSON.stringify({ id:inicial?.id, ...form }),
      });
      onSaved();
    } catch(e){console.error(e);}
    finally{setSaving(false);}
  }

  return (
    <div className="up" onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:420,background:'var(--s1)',border:'1px solid var(--bdr)',borderRadius:20,padding:24,maxHeight:'88vh',overflowY:'auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
        <div style={{fontFamily:'Bebas Neue,cursive',fontSize:22,color:'var(--neon)'}}>{inicial?'EDITAR':'NOVO'} SERVIÇO</div>
        <button onClick={onClose} style={{padding:8,borderRadius:8,background:'rgba(255,255,255,.05)',border:'none',cursor:'pointer',color:'var(--dim)',fontSize:18}}>✕</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:13}}>
        <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Nome *</label><input type="text" value={form.nome} onChange={e=>sf('nome',e.target.value)} placeholder="Ex: Encerramento" className="fi"/></div>
        <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:8,textTransform:'uppercase'}}>Emoji</label>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {EMOJIS_SERV.map(e=>(<button key={e} onClick={()=>sf('emoji',e)} style={{width:34,height:34,borderRadius:8,fontSize:18,cursor:'pointer',background:form.emoji===e?'rgba(0,229,255,.18)':'rgba(255,255,255,.05)',border:`2px solid ${form.emoji===e?'var(--neon)':'rgba(255,255,255,.08)'}`}}>{e}</button>))}
          </div>
        </div>
        <div><label style={{fontSize:11,color:'var(--dim)',fontWeight:600,display:'block',marginBottom:5,textTransform:'uppercase'}}>Descrição</label><input type="text" value={form.descricao} onChange={e=>sf('descricao',e.target.value)} placeholder="Ex: Encerramento de pintura" className="fi"/></div>
      </div>
      <button onClick={salvar} disabled={saving||!form.nome} style={{width:'100%',marginTop:20,padding:13,borderRadius:12,fontWeight:700,fontSize:14,cursor:!form.nome?'not-allowed':'pointer',opacity:!form.nome?.4:1,background:'linear-gradient(135deg,rgba(0,229,255,.18),rgba(0,229,255,.08))',border:'1px solid rgba(0,229,255,.4)',color:'var(--neon)'}}>
        {saving?'Salvando…':'✓ Salvar'}
      </button>
    </div>
  );
}

const MAIS_IDS = ['clientes','planos','servicos','modelos','precos','config'];

function App() {
  const [user,        setUser]        = useState(null);
  const [gamif,       setGamif]       = useState(null);
  const [config,      setConfig]      = useState(null);
  const [mostrarMais, setMostrarMais] = useState(false);
  const [novaConquista, setNovaConquista] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [cats,        setCats]        = useState(CAT_FB);
  const [historico,setHistorico]= useState(loadHist);
  const [screen,   setScreen]   = useState('consulta');
  const [plate,    setPlate]    = useState('');
  const [loading,  setLoading]  = useState(false);
  const [result,   setResult]   = useState(null);
  const [error,    setError]    = useState(null);
  const [modal,    setModal]    = useState(null);
  const inputRef = useRef(null);

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null); setAuthLoading(false);
    });
    const {data:{subscription}} = supabase.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if (!user) return;
    fetchCategorias().then(data=>{ if(data) setCats(data); });
    fetchGamificacao().then(setGamif);
    fetchConfig().then(setConfig);
  },[user]);

  async function reloadCats() {
    const data = await fetchCategorias();
    if (data) setCats(data);
  }

  const doSearch = useCallback(async(pArg)=>{
    const p = cleanP(pArg||plate);
    if (!isValid(p)){setError('Placa inválida. Use AAA1234 ou AAA1A23.');return;}
    setLoading(true); setError(null); setResult(null); setScreen('consulta');
    try {
      const data = await consultarPlaca(p);
      // Categoria: usa a que veio do banco (_categoriaId) se existir no mapa cats
      // Senão classifica automaticamente
      const cat = (data.categoriaIdSalva && cats[data.categoriaIdSalva])
        ? cats[data.categoriaIdSalva]
        : classify(data, cats);
      setResult({data, cat});
      // Salva no histórico local
      setHistorico(prev=>{
        const entry = {placa:p, data, cat, at:new Date().toISOString(), visitas:1};
        const existe = prev.find(h=>h.placa===p);
        if (existe) entry.visitas = (existe.visitas||1)+1;
        const novo = [entry, ...prev.filter(h=>h.placa!==p)].slice(0,200);
        saveHist(novo);
        return novo;
      });
    } catch(e){
      setError(e.message||'Erro desconhecido.');
    } finally{setLoading(false);}
  },[plate, cats]);

  const clear=()=>{setResult(null);setError(null);setPlate('');setTimeout(()=>inputRef.current?.focus(),50);};
  const canQ = plate.length===7&&!loading;
  const fmt  = plate.length===7?fmtLbl(plate):null;
  const pd   = fmtDisp(plate);

    if (authLoading) return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:'Bebas Neue,cursive',fontSize:42,color:'var(--neon)',letterSpacing:'.1em',marginBottom:16}}>💧 PLACAWASH</div>
          <div style={{display:'flex',justifyContent:'center',gap:7}}>{[0,180,360].map(d=>(<div key={d} className="blink" style={{width:10,height:10,borderRadius:'50%',background:'var(--neon)',animationDelay:d+'ms'}}/>))}</div>
        </div>
      </div>
    );
    if (!user) return <LoginScreen/>;
    return (
    <div className="grid-bg" style={{minHeight:'100vh',display:'flex',flexDirection:'column',position:'relative'}}>
      <div style={{position:'fixed',top:0,left:'50%',transform:'translateX(-50%)',width:'500px',height:'220px',borderRadius:'50%',opacity:.07,filter:'blur(70px)',background:'radial-gradient(ellipse,#00e5ff,transparent 70%)',pointerEvents:'none',zIndex:0}}/>
      <nav className="nav">
        {[['consulta','🔍','Consultar'],['os','🧾','Fila'],['caixa','💵','Caixa']].map(([id,ic,lb])=>(
          <button key={id} onClick={()=>setScreen(id)} className={`nav-btn ${screen===id?'on':''}`}>
            <span style={{fontSize:18}}>{ic}</span><span>{lb}</span>
          </button>
        ))}
        <button onClick={()=>setMostrarMais(m=>!m)} className={`nav-btn ${MAIS_IDS.includes(screen)?'on':''}`}>
          <span style={{fontSize:18}}>⋯</span><span>Mais</span>
        </button>
      </nav>
      {mostrarMais&&(
        <div onClick={()=>setMostrarMais(false)} style={{position:'fixed',inset:0,zIndex:49}}/>
      )}
      {mostrarMais&&(
        <div style={{position:'absolute',top:54,right:8,zIndex:50,background:'var(--s1)',border:'1px solid var(--bdr)',borderRadius:12,overflow:'hidden',boxShadow:'0 8px 24px rgba(0,0,0,.5)',minWidth:180}}>
          {[['clientes','🗂️','Clientes'],['planos','📋','Planos'],['servicos','🧴','Serviços'],['modelos','🏷️','Modelos'],['precos','💰','Preços'],['config','⚙️','Configurações']].map(([id,ic,lb])=>(
            <button key={id} onClick={()=>{setScreen(id);setMostrarMais(false);}}
              style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:screen===id?'rgba(0,229,255,.08)':'transparent',border:'none',borderBottom:'1px solid rgba(255,255,255,.05)',color:screen===id?'var(--neon)':'var(--txt)',cursor:'pointer',fontSize:13,textAlign:'left'}}>
              <span style={{fontSize:16}}>{ic}</span>{lb}
            </button>
          ))}
          <button onClick={()=>supabase.auth.signOut()}
            style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:'rgba(244,67,54,.06)',border:'none',color:'#f44336',cursor:'pointer',fontSize:13,textAlign:'left',fontWeight:600}}>
            <span style={{fontSize:16}}>↩</span>Sair
          </button>
        </div>
      )}
      <div style={{position:'relative',zIndex:1,flex:1}}>

        {/* ── CONSULTAR ── */}
        {screen==='consulta'&&(
          <div style={{maxWidth:640,margin:'0 auto',padding:'24px 16px 88px'}}>
            <header style={{textAlign:'center',marginBottom:24}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:4}}>
                <span style={{fontSize:26}}>💧</span>
                <h1 style={{fontFamily:'Bebas Neue,cursive',fontSize:46,letterSpacing:'.1em',color:'var(--neon)',lineHeight:1,textShadow:'0 0 10px rgba(0,229,255,.9),0 0 28px rgba(0,229,255,.45)'}}>PLACAWASH</h1>
              </div>
              <p style={{fontSize:12,color:'var(--dim)'}}>Identifique veículos pela placa e precifique a lavagem</p>
            </header>

            <StreakBar gamif={gamif}/>

            {/* Botão Nova OS — sempre visível */}
            <button onClick={()=>setModal('novaOS')}
              style={{width:'100%',padding:'14px',borderRadius:14,fontWeight:700,fontSize:16,cursor:'pointer',marginBottom:16,
                background:'linear-gradient(135deg,var(--acid),#9fd400)',border:'none',color:'#0a0f05',
                display:'flex',alignItems:'center',justifyContent:'center',gap:10,boxShadow:'0 6px 20px rgba(204,255,0,.2)'}}>
              🧾 Nova Ordem de Serviço
            </button>
            <div className="plate-wrap neon-glow" style={{marginBottom:11,overflow:'hidden',position:'relative'}}>
              {loading&&<div className="scan"/>}
              <div style={{display:'flex',alignItems:'center',padding:'18px 22px',gap:12}}>
                <div style={{flex:1}}>
                  <input ref={inputRef} type="text" value={pd} onChange={e=>{setPlate(cleanP(e.target.value).slice(0,7));setError(null);}} onKeyDown={e=>e.key==='Enter'&&doSearch()} placeholder="ABC-1234" className="plate-inp" maxLength={8} autoCapitalize="characters" autoFocus style={{opacity:loading?.55:1}}/>
                  {fmt&&<div style={{fontSize:10,marginTop:3,fontFamily:'JetBrains Mono,monospace',color:'var(--dim)',letterSpacing:'.1em'}}>● {fmt}</div>}
                </div>
                <button onClick={()=>doSearch()} disabled={!canQ} style={{padding:'13px 20px',borderRadius:10,fontSize:13,fontWeight:600,flexShrink:0,cursor:canQ?'pointer':'not-allowed',opacity:canQ?1:.38,background:canQ?'var(--neon)':'rgba(0,229,255,.1)',color:canQ?'#070b0f':'var(--neon)',border:'1px solid var(--neon)',transition:'all .2s',display:'flex',alignItems:'center',gap:8}}>
                  {loading?<span style={{width:15,height:15,border:'2px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block',animation:'spin .9s linear infinite'}}/>:'🔍'}
                  {loading?'Buscando…':'Consultar'}
                </button>
              </div>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:20}}>
              <button onClick={()=>setModal('manual')} style={{display:'flex',alignItems:'center',gap:5,padding:'6px 12px',borderRadius:8,fontSize:12,background:'rgba(204,255,0,.08)',border:'1px solid rgba(204,255,0,.22)',color:'var(--acid)',cursor:'pointer'}}>✏️ Entrada manual</button>
              {result&&<button onClick={clear} style={{display:'flex',alignItems:'center',gap:5,padding:'6px 12px',borderRadius:8,fontSize:12,background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.09)',color:'var(--dim)',cursor:'pointer'}}>✕ Nova consulta</button>}
            </div>
            {error&&!loading&&(
              <div className="up" style={{marginBottom:20,padding:16,borderRadius:12,background:'rgba(244,67,54,.08)',border:'1px solid rgba(244,67,54,.3)'}}>
                <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                  <span style={{fontSize:20,flexShrink:0}}>⚠️</span>
                  <div><div style={{fontSize:13,fontWeight:600,color:'#f44336',marginBottom:4}}>Erro na consulta</div><div style={{fontSize:12,color:'var(--dim)',lineHeight:1.6}}>{error}</div></div>
                </div>
              </div>
            )}
            {loading&&(
              <div className="up" style={{marginBottom:20,padding:28,borderRadius:12,background:'var(--s1)',border:'1px solid var(--bdr)',textAlign:'center'}}>
                <div style={{display:'flex',justifyContent:'center',gap:7,marginBottom:10}}>{[0,180,360].map(d=>(<div key={d} className="blink" style={{width:8,height:8,borderRadius:'50%',background:'var(--neon)',animationDelay:`${d}ms`}}/>))}</div>
                <div style={{fontSize:13,color:'var(--dim)'}}>Consultando <strong style={{color:'var(--neon)'}}>apiplacas.com.br</strong>…</div>
              </div>
            )}
            {result&&!loading&&(
              <div className="up">
                {result.data.fromCache&&(
                  <div style={{marginBottom:10,padding:9,borderRadius:9,background:'rgba(0,229,255,.06)',border:'1px solid rgba(0,229,255,.2)',fontSize:11,color:'var(--neon)',display:'flex',gap:7,alignItems:'center'}}>
                    <span>⚡</span><span>Cache local — sem gastar crédito da API</span>
                  </div>
                )}

                {/* Card consolidado: veículo + categoria + preço */}
                <div style={{background:`linear-gradient(135deg,${result.cat?.color||'#ccff00'}13,${result.cat?.color||'#ccff00'}05)`,border:`1px solid ${result.cat?.color||'#ccff00'}42`,borderRadius:16,padding:18,marginBottom:14}}>
                  <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:14}}>
                    <div style={{fontSize:32,width:56,height:56,borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',background:`${result.cat?.color||'#ccff00'}18`,flexShrink:0}}>{result.cat?.emoji||'🚗'}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:16,fontWeight:700,color:'var(--txt)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{result.data.marca} {result.data.modelo}</div>
                      <div style={{display:'flex',gap:7,alignItems:'center',marginTop:3,flexWrap:'wrap'}}>
                        {result.data.cor&&<span style={{fontSize:12,color:'var(--dim)'}}>🎨 {result.data.cor}</span>}
                        {result.data.ano&&<span style={{fontSize:12,color:'var(--dim)'}}>· {result.data.ano}</span>}
                      </div>
                    </div>
                  </div>
                  <div style={{height:1,background:'rgba(255,255,255,.08)',marginBottom:14}}/>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                        <span style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',color:result.cat?.color,textTransform:'uppercase'}}>{result.cat?.label}</span>
                        {!result.data.categoriaManual&&<span className="chip chip-yellow" style={{fontSize:9}}>auto</span>}
                      </div>
                      <div style={{fontFamily:'Bebas Neue,cursive',fontSize:38,color:result.cat?.color,lineHeight:1,textShadow:`0 0 14px ${result.cat?.color}55`}}>R$ {result.cat?.preco??0}</div>
                    </div>
                    <button onClick={()=>setModal('editCat')} style={{padding:'6px 12px',borderRadius:8,fontSize:11,fontWeight:600,cursor:'pointer',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.14)',color:'var(--dim)',flexShrink:0}}>✏️ Corrigir</button>
                  </div>
                </div>

                <div style={{display:'flex',gap:8,marginTop:4}}>
                  <button onClick={clear} style={{fontSize:11,color:'var(--dim)',background:'none',border:'none',cursor:'pointer',padding:'6px'}}>✕ Nova consulta</button>
                  <button onClick={()=>setScreen('precos')} style={{fontSize:11,color:'var(--dim)',background:'none',border:'none',cursor:'pointer',padding:'6px',marginLeft:'auto'}}>Editar preços ›</button>
                </div>
              </div>
            )}
          </div>
        )}

        {screen==='os'       && <OSScreen cats={cats} config={config}/>}
        {screen==='caixa'    && <CaixaScreen cats={cats}/>}
        {screen==='clientes' && <ClientesScreen cats={cats} onSelectPlate={p=>{setPlate(cleanP(p));setScreen('consulta');doSearch(p);}}/>}
        {screen==='planos'   && <PlanosScreen/>}
        {screen==='servicos' && <ServicosScreen cats={cats}/>}
        {screen==='modelos'  && <ModelosScreen cats={cats}/>}
        {screen==='precos'   && <PriceManager cats={cats} onReload={reloadCats}/>}
        {screen==='config'   && <ConfiguracoesScreen user={user} config={config} onConfigSaved={setConfig}/>}
      </div>

      {modal==='manual'&&(
        <ManualModal cats={cats} onClose={()=>setModal(null)} onResult={raw=>{
          const data={...raw,codigoSituacao:'0',fromCache:false,categoriaManual:false};
          const cat=classify(data,cats);
          setResult({data,cat});
          setModal(null);
        }}/>
      )}
      {modal==='novaOS'&&(
        <NovaOSModal cats={cats} config={config} onClose={()=>setModal(null)} onSaved={()=>{
          setModal(null); setScreen('os');
          checkinGamificacao().then(r=>{
            if (r?.novo && r.streak>1) {
              setNovaConquista({id:'streak', emoji:'🔥', label:r.streak+' dias seguidos!'});
            }
          });
          fetchGamificacao().then(g=>{
            if (g) {
              // Detecta nova conquista comparando com estado anterior
              setGamif(prev=>{
                if (prev && g.conquistas.length > prev.conquistas.length) {
                  const nova = g.conquistas[g.conquistas.length-1];
                  setTimeout(()=>setNovaConquista(nova), 1200);
                }
                return g;
              });
            }
          });
        }}/>
      )}
      {novaConquista&&<ConquistaToast conquista={novaConquista} onClose={()=>setNovaConquista(null)}/>}
      {modal==='editCat'&&result&&(
        <EditCatModal data={result.data} catAtual={result.cat} cats={cats}
          onClose={()=>setModal(null)}
          onSaved={novaCat=>setResult(r=>({...r,cat:novaCat,data:{...r.data,categoriaManual:true,categoriaIdSalva:novaCat.id}}))}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
